<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中式母爱性格分析 - Win95 Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        :root { --win-gray: #c0c0c0; --win-blue: #000080; }
        body { background-color: #008080; font-family: 'DotGothic16', sans-serif; margin: 0; overflow-x: hidden; }
        .win-outset { border: 2px solid; border-color: #fff #808080 #808080 #fff; }
        .win-inset { border: 2px solid; border-color: #808080 #fff #fff #808080; background: white; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); }
        .crt-effect {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.1;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const resultProfiles = {
            FruitPlate: { title: "【果盘主理人】", desc: "有些妈妈说“我爱你”，她则是直接冷藏在冰箱里递给你。切好的苹果是她的加密情书。" },
            CCTV: { title: "【人肉监控探头】", desc: "爱让你妈的神经系统变成了全天候安防。你还没开口，她已经拦截了你的不安。" },
            Ranked: { title: "【排位赛教练】", desc: "她通过期待来表达爱。即使那看起来像压力，但她其实是你此生唯一的死忠粉。" },
            ATM: { title: "【带情绪的ATM】", desc: "她脆弱时的表现就是问你‘钱够不够花’。这是她能想到的最直接的遮风挡雨。" },
            NPC: { title: "【背景板NPC】", desc: "她爱得如此安静，以至于几乎成了生活的背景色。等她老了，背景色也会慢慢褪去。" },
            Logistics: { title: "【后勤部长】", desc: "她把你的生活承重扛得太稳，以至于你甚至没发现自己生活在某种巨大的负重前行中。" },
            Forwarded: { title: "【养生文转播使】", desc: "转发文章是她留在你生活里的唯一方式。那些被你嫌弃的标题党，是她无法表达的牵挂。" },
            Fine: { title: "【“我没事”战神】", desc: "她花了太长时间保护所有人，以至于没人注意到她其实也会累。她最擅长的事情就是不麻烦你。" },
        };
        const questions = [
            { q: "1. 此时此刻，你妈的手机相册里最多的是：", options: ["A. 你的各种丑照/生活照", "B. 社区团购/打折信息", "C. 鲜花、风景、语录", "D. 各种养生食谱截图", "E. 只有几张系统自带图片"], types: ['CCTV', 'Logistics', 'Forwarded', 'FruitPlate', 'NPC'] },
            { q: "2. 你偶尔生个小病发朋友圈，半小时后：", options: ["A. 她直接夺命连环call", "B. 转发养生文章", "C. 微信转账：‘去买点吃的’", "D. 骂你熬夜，顺便熬了梨汤", "E. 没点赞，但下午快递到了"], types: ['CCTV', 'Forwarded', 'ATM', 'Ranked', 'Fine'] },
            { q: "3. 饭桌上她最常说的一句话是：", options: ["A. ‘这个有营养，多吃点。’", "B. ‘你看人家那谁谁...’", "C. ‘你们吃，我不饿。’", "D. ‘再吃一碗，就最后一碗。’", "E. ‘这菜是不是咸了？’"], types: ['FruitPlate', 'Ranked', 'Fine', 'Logistics', 'NPC'] },
            { q: "4. 你说你想换个工作，她的第一反应：", options: ["A. ‘那个公司管饭吗？’", "B. ‘钱够花吗？妈这有。’", "C. ‘稳定吗？有编制吗？’", "D. ‘想做就做，别太累。’", "E. 发来个养生视频"], types: ['Logistics', 'ATM', 'Ranked', 'Fine', 'Forwarded'] },
            { q: "5. 家里冰箱的状态通常是：", options: ["A. 永远塞得快爆炸", "B. 整齐得像超市货架", "C. 全是给你留的半成品", "D. 只有几个孤零零的剩菜", "E. 充满了各种神器的塑料袋"], types: ['FruitPlate', 'Logistics', 'CCTV', 'NPC', 'Fine'] },
            { q: "6. 当你问她‘妈你累吗？’，她通常说：", options: ["A. ‘早习惯了，不累。’", "B. ‘谁不累啊，为了你。’", "C. ‘去写你的作业去。’", "D. 笑着去切水果了", "E. ‘你听话我就不累。’"], types: ['Fine', 'Ranked', 'NPC', 'FruitPlate', 'CCTV'] },
            { q: "7. 过年回家，她给你的行李箱塞了：", options: ["A. 足够吃半年的老家特产", "B. 干净的内衣袜子", "C. 没什么，但偷偷塞了钱", "D. 全是你爱吃的零食", "E. 沉甸甸的，都是爱"], types: ['Logistics', 'Fine', 'ATM', 'FruitPlate', 'CCTV'] },
            { q: "8. 她在微信群里的画风是：", options: ["A. 发各种奇怪的表情包", "B. 疯狂转发文章", "C. 只看不说话，偶尔点赞", "D. 汇报全家人今天的菜谱", "E. 艾特你询问一切琐事"], types: ['NPC', 'Forwarded', 'Fine', 'FruitPlate', 'CCTV'] },
            { q: "9. 假如你妈中了大奖，她第一件事会：", options: ["A. 给你买套房或存起来", "B. 终于舍得去旅游了", "C. 把亲戚全请一遍客", "D. 还是像往常一样去买菜", "E. 谁也不告诉，怕你有压力"], types: ['ATM', 'Ranked', 'Logistics', 'NPC', 'Fine'] },
            { q: "10. 回到小时候，最容易想起的画面：", options: ["A. 厨房里忙碌的背影", "B. 她叫你起床的声音", "C. 只有她守着的电视机", "D. 课桌前她递来的果盘", "E. 下雨天校门口的雨伞"], types: ['Logistics', 'Fine', 'NPC', 'FruitPlate', 'CCTV'] }
        ];
        const App = () => {
            const [step, setStep] = useState('start');
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState([]);
            const handleAnswer = (idx) => {
                const newAnswers = [...answers, questions[currentIdx].types[idx]];
                setAnswers(newAnswers);
                if (currentIdx < questions.length - 1) { setCurrentIdx(currentIdx + 1); } 
                else { setStep('loading'); setTimeout(() => setStep('result'), 1500); }
            };
            const getResult = () => {
                const counts = {};
                answers.forEach(x => counts[x] = (counts[x] || 0) + 1);
                const resKey = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
                return resultProfiles[resKey];
            };
            const Window = ({ title, children }) => (
                <div className="win-outset bg-[#c0c0c0] max-w-md w-full m-4 shadow-2xl">
                    <div className="title-bar h-7 flex items-center justify-between px-1 m-0.5 text-white text-[12px] font-bold">
                        <span>{title}</span>
                        <div className="flex gap-0.5"><div className="win-outset bg-[#c0c0c0] w-4 h-4 text-black text-center leading-3">x</div></div>
                    </div>
                    <div className="p-6">{children}</div>
                </div>
            );
            return (
                <div className="h-screen w-full flex items-center justify-center relative overflow-hidden">
                    <div className="crt-effect"></div>
                    {step === 'start' && (
                        <Window title="MOM_TEST.EXE">
                            <div className="text-center">
                                <div className="win-inset p-4 mb-6"><h1 className="text-xl font-bold">中式母爱性格分析</h1></div>
                                <button onClick={() => setStep('quiz')} className="win-outset bg-[#c0c0c0] px-8 py-2 active:win-inset font-bold">启动扫描</button>
                            </div>
                        </Window>
                    )}
                    {step === 'quiz' && (
                        <Window title={`SCANNING... ${currentIdx + 1}/10`}>
                            <div className="win-inset p-4 mb-4 text-sm">{questions[currentIdx].q}</div>
                            <div className="grid gap-2">
                                {questions[currentIdx].options.map((opt, i) => (
                                    <button key={i} onClick={() => handleAnswer(i)} className="win-outset bg-[#c0c0c0] p-2 text-left text-xs hover:bg-[#000080] hover:text-white">{opt}</button>
                                ))}
                            </div>
                        </Window>
                    )}
                    {step === 'loading' && <Window title="请稍候..."><div className="text-center py-4">正在对比母爱样本...</div></Window>}
                    {step === 'result' && (
                        <Window title="扫描报告">
                            <div className="win-inset p-4 mb-4 text-center">
                                <h2 className="text-lg font-bold text-blue-800">{getResult().title}</h2>
                                <p className="text-xs mt-2 italic">{getResult().desc}</p>
                            </div>
                            <button onClick={() => location.reload()} className="win-outset w-full py-2">重新测试</button>
                        </Window>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
